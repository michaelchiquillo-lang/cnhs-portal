<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNHS Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="screen">
      <div class="login-card">
        <h1>CNHS Portal</h1>
        <p class="muted">Live demo with Supabase</p>

        <label>Email</label>
        <input id="email" type="email" placeholder="student@cnhs.test" />

        <label>Password</label>
        <input id="password" type="password" placeholder="Test1234!" />

        <button id="loginBtn">Log in</button>
        <p id="loginMessage" class="message"></p>

        <div class="helper">
          <strong>Test accounts</strong><br />
          student@cnhs.test / Test1234!<br />
          parent@cnhs.test / Test1234!
        </div>
      </div>
    </div>

    <div id="dashboardScreen" class="screen hidden">
      <header class="topbar">
        <div>
          <h2>CNHS Portal</h2>
          <p id="welcomeText" class="muted"></p>
        </div>
        <button id="logoutBtn" class="secondary">Logout</button>
      </header>

      <main class="container">
        <section class="card">
          <div class="row between">
            <div>
              <h3>Current User</h3>
              <p id="roleText" class="muted"></p>
            </div>
            <div id="childSelectorWrap" class="hidden">
              <label for="childSelector">Child</label>
              <select id="childSelector"></select>
            </div>
          </div>
        </section>

        <section class="card">
          <h3>Quarter 2 Grades</h3>
          <div id="gradesList"></div>
        </section>

        <section class="card">
          <h3>Requests</h3>
          <div class="request-form">
            <select id="requestType">
              <option value="Good Moral">Good Moral</option>
              <option value="Certificate of Enrollment">Certificate of Enrollment</option>
              <option value="SF10">SF10</option>
              <option value="Report Card Copy">Report Card Copy</option>
              <option value="Certification of Grades">Certification of Grades</option>
            </select>
            <input id="requestPurpose" type="text" placeholder="Purpose" />
            <button id="requestBtn">Submit Request</button>
          </div>
          <p id="requestMessage" class="message"></p>
          <div id="requestsList"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
